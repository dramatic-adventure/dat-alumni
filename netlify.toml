# netlify.toml
[build]
  command = "export NODE_OPTIONS=--max-old-space-size=4096 && npm run prisma:generate && npm run build"
  publish  = ".next"

[functions]
  directory = "netlify/functions"

# Note on Next.js server handler size:
#
# @netlify/plugin-nextjs generates .netlify/functions-internal/
# ___netlify-server-handler/___netlify-server-handler.json at build time with
#   includedFiles: ["**"]
#   includedFilesBasePath: <that same handler directory>
#   nodeBundler: "none"
# That manifest is authoritative for zip-it-and-ship-it, so negated
# `[functions."___netlify-server-handler"].included_files` entries in this
# file are silently ignored for that function (confirmed by reading the
# plugin source in opennextjs-netlify/src/build/functions/server.ts).
#
# To keep the handler under Netlify's 50 MB upload limit, exclusions must be
# applied in one of two places that the plugin actually respects:
#   1. next.config.ts `outputFileTracingExcludes` — filters files out of
#      `.next/standalone`, which the plugin copies into the handler dir.
#   2. The local Netlify Build plugin declared below, which runs in
#      onPostBuild (after the Next.js plugin populates the handler dir, and
#      before zip-it-and-ship-it zips it) and physically deletes files from
#      the handler directory. That plugin also logs actual on-disk sizes so
#      production deploy logs contain ground truth, not a simulated zip.

[[plugins]]
  package = "./netlify/plugins/prune-server-handler"

[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "public/namestack-hints.json"

# Prevent Netlify's CDN from caching the Drive thumbnail proxy across different fileId
# query params. This rule runs at the CDN config layer (before @netlify/plugin-nextjs
# can interfere) and is the authoritative no-store instruction for this path.
[[headers]]
  for = "/api/media/thumb"
  [headers.values]
    Cache-Control = "private, max-age=31536000, stale-while-revalidate=86400"
    CDN-Cache-Control = "no-store"
    Netlify-CDN-Cache-Control = "no-store"
