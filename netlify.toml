# netlify.toml
[build]
  command = "export NODE_OPTIONS=--max-old-space-size=4096 && npm run prisma:generate && npm run build"
  publish  = ".next"
  
[functions]
  directory = "netlify/functions"
  # Force sharp's native binary into the function bundle. Next's file tracing can
  # miss sharp's platform-specific @img/* native module (loaded via a runtime
  # dynamic require), which left the SSR handler without sharp and broke the image
  # routes. These globs resolve on the Linux build machine, so the linux-x64
  # @img binaries ship with the function.
  included_files = ["node_modules/sharp/**", "node_modules/@img/**"]

[[plugins]]
  package = "./netlify/plugins/prune-server-handler"

[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "public/namestack-hints.json"

# Prevent Netlify's CDN from caching the Drive thumbnail proxy across different fileId
# query params. This rule runs at the CDN config layer (before @netlify/plugin-nextjs
# can interfere) and is the authoritative no-store instruction for this path.
[[headers]]
  for = "/api/media/thumb"
  [headers.values]
    Cache-Control = "private, max-age=31536000, stale-while-revalidate=86400"
    CDN-Cache-Control = "no-store"
    Netlify-CDN-Cache-Control = "no-store"

# Same cross-query-param caching hazard as the thumbnail proxy above: the media
# list is distinguished only by the ?alumniId= query string, and Netlify's CDN
# was serving one profile's album for another alumniId — so a profile's photos
# bled onto other (often empty) profiles until a hard refresh. Force no-store at
# the CDN config layer so each alumniId's list is always fetched fresh.
[[headers]]
  for = "/api/media/list"
  [headers.values]
    Cache-Control = "private, no-store"
    CDN-Cache-Control = "no-store"
    Netlify-CDN-Cache-Control = "no-store"