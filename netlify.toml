# netlify.toml
[build]
  command = "export NODE_OPTIONS=--max-old-space-size=4096 && export DATABASE_URL=file:/tmp/dev.db && npm run prisma:generate && npm run build"
  publish  = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  directory = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "public/namestack-hints.json"